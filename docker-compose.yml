version: "3.9"

services:
  php:
    image: php:8.2-fpm
    container_name: kijani-php
    volumes:
      - ./app/src:/var/www/html

  nginx:
    image: nginx:latest
    container_name: kijani-nginx
    ports:
      - "8080:80"
    volumes:
      - ./app/src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php